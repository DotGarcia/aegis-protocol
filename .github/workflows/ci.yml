name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo doc --workspace --no-deps
      - run: cargo package -p aegis-protocol-core
      - run: cargo package -p aegis-protocol-idl
      - run: cargo package -p aegis-protocol-wire
      - run: cargo package -p aegis-protocol-codegen
      - run: cargo package -p aegis-protocol
      - run: cargo package -p aegis-protocol-cli
