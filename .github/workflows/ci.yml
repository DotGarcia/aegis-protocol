name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo doc --workspace --no-deps
      - run: cargo publish -p aegis-protocol-core --dry-run
      - run: cargo publish -p aegis-protocol-wire --dry-run
      - run: cargo publish -p aegis-protocol-idl --dry-run
      - run: cargo publish -p aegis-protocol-codegen --dry-run
      - run: cargo publish -p aegis-protocol --dry-run
      - run: cargo publish -p aegis-cli --dry-run
